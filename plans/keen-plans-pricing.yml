specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Keen
providerId: keen
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Custom Events
  - Data Collection
  - Embedded Analytics
  - Event Analytics
description: Keen prices on tiered subscription plans (Team, Business, Custom) with included event/query
  quotas and per-unit overages for events, queries, cached queries, and cached datasets. Annual
  prepayment carries a 10% discount; S3 Streaming is an add-on on the Team plan.
sources:
  - https://keen.io/pricing/
plans:
  - id: keen-team
    name: Team
    type: subscription
    description: $149/mo ($134/mo annual). 250K events, 5K queries, 5 cached queries, 5 cached datasets,
      2-year retention.
    entries:
      - label: Monthly platform fee
        name: team_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '149.00'
        userMultiplied: false
      - label: Annual platform fee (per month equivalent)
        name: team_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '134.00'
        userMultiplied: false
      - label: Included events
        name: team_events
        type: quota
        metric: event
        limit: 250000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Included queries
        name: team_queries
        type: quota
        metric: query
        limit: 5000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: S3 Streaming add-on
        name: team_s3_streaming
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '100.00'
        userMultiplied: false
    elements:
      - name: Data Explorer
      - name: Dashboard Creator
      - name: Role-Based Access
      - name: 2-year data retention
      - name: 5 cached queries
      - name: 5 cached datasets
  - id: keen-business
    name: Business
    type: subscription
    description: $699/mo ($629/mo annual). 3.5M events, 20K queries, 50 cached queries, 50 cached datasets,
      includes S3 Streaming and Custom SSL with 48-hour response SLA.
    entries:
      - label: Monthly platform fee
        name: business_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '699.00'
        userMultiplied: false
      - label: Annual platform fee (per month equivalent)
        name: business_annual
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '629.00'
        userMultiplied: false
      - label: Included events
        name: business_events
        type: quota
        metric: event
        limit: 3500000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Included queries
        name: business_queries
        type: quota
        metric: query
        limit: 20000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: S3 Streaming
      - name: Custom SSL
      - name: 48-hour response SLA
      - name: 50 cached queries
      - name: 50 cached datasets
  - id: keen-custom
    name: Custom
    type: enterprise
    description: Negotiated pricing with customizable usage limits, Solutions Architect, Customer Success
      Manager, and integration services.
    entries:
      - label: Custom contract
        name: custom_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Customizable usage limits
      - name: Enterprise support
      - name: Solutions Architect
      - name: Customer Success Manager
      - name: Integration services
  - id: keen-overages
    name: Overage Pricing
    type: usage-based
    description: Per-unit overage charges applied when subscription quotas are exceeded.
    entries:
      - label: Events overage
        name: overage_events
        type: metered
        metric: event
        limit: -1
        timeFrame: usage
        geo: global
        unit: 5000
        price: '1.00'
        userMultiplied: false
      - label: Queries overage
        name: overage_queries
        type: metered
        metric: query
        limit: -1
        timeFrame: usage
        geo: global
        unit: 100
        price: '5.00'
        userMultiplied: false
      - label: Cached query overage
        name: overage_cached_query
        type: metered
        metric: cached_query
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '10.00'
        userMultiplied: false
      - label: Cached dataset overage
        name: overage_cached_dataset
        type: metered
        metric: cached_dataset
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '20.00'
        userMultiplied: false
    elements:
      - name: Charged on top of subscription quota
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
