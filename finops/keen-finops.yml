specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Keen
providerId: keen
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Analytics
  - Event Analytics
  - Embedded Analytics
description: 'FOCUS-aligned FinOps for Keen: tiered subscription (Team/Business/Custom) with per-unit
  overages on events, queries, cached queries, and cached datasets.'
sources:
  - https://keen.io/pricing/
  - https://keen.io/docs/api/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Keen IO, Inc.
serviceCategory: Analytics
billingModel:
  pricingCategory: Tiered Subscription + Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Keen
  ServiceCategory: Analytics
  ProviderName: Keen
  PublisherName: Keen IO, Inc.
  InvoiceIssuerName: Keen IO, Inc.
  BillingCurrency: USD
meters:
  - name: events_recorded
    unit: event
    aggregation: sum
    dimensions:
      - project
      - collection
  - name: queries_executed
    unit: query
    aggregation: sum
    dimensions:
      - project
      - query_type
  - name: cached_queries
    unit: cached_query
    aggregation: max
    dimensions:
      - project
  - name: cached_datasets
    unit: cached_dataset
    aggregation: max
    dimensions:
      - project
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: s3_streaming_addon
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Use Keen's project usage dashboard and the Account API to monitor monthly event and query
      consumption against included quotas.
  - name: Allocation
    description: Separate consuming teams into distinct Keen projects (each with its own keys) so events
      and queries roll up cleanly to a chargeback dimension.
  - name: Optimization
    description: Move recurring dashboards to cached queries and cached datasets to bypass ad-hoc query
      limits and avoid query overage charges; commit annually for a 10% discount.
  - name: Accountability
    description: Project owners reconcile event/query overages monthly and tune retention and dashboard
      patterns before the next billing cycle.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
